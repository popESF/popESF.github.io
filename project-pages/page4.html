<!DOCTYPE html>
<html lang="en">
<head>
  <style>
      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background: #090909;
        color: #f3f3f3;
        font-family: 'Courier New', Courier, monospace;
        letter-spacing: 0.02em;
        position: relative;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image: radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 16%),
          radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 14%),
          linear-gradient(180deg, rgba(255,255,255,0.02), transparent 40%, rgba(255,255,255,0.02));
        opacity: 0.35;
        pointer-events: none;
        mix-blend-mode: screen;
        z-index: -1;
      }

      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background-image:
          radial-gradient(circle at 8% 12%, rgba(255, 255, 255, 0.95), transparent 1px),
          radial-gradient(circle at 18% 24%, rgba(255, 255, 255, 0.85), transparent 1px),
          radial-gradient(circle at 30% 68%, rgba(255, 255, 255, 0.9), transparent 1px),
          radial-gradient(circle at 42% 40%, rgba(255, 255, 255, 0.7), transparent 1px),
          radial-gradient(circle at 58% 18%, rgba(255, 255, 255, 0.8), transparent 1px),
          radial-gradient(circle at 72% 62%, rgba(255, 255, 255, 0.9), transparent 1px),
          radial-gradient(circle at 86% 32%, rgba(255, 255, 255, 0.75), transparent 1px),
          radial-gradient(circle at 90% 82%, rgba(255, 255, 255, 0.85), transparent 1px);
        opacity: 0.35;
        z-index: -1;
      }

      .starfield {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        font-size: 0;
      }

      .starfield .star {
        position: absolute;
        color: rgba(255, 255, 255, 0.95);
        font-size: 20px;
        line-height: 1;
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.18);
        animation: starFlicker 3.5s infinite ease-in-out;
        opacity: 0.85;
      }

      .starfield .star--small {
        font-size: 12px;
        opacity: 0.65;
      }

      .starfield .star--faint {
        opacity: 0.5;
        text-shadow: 0 0 4px rgba(255, 255, 255, 0.12);
      }

      .starfield .star:nth-child(1) { top: 4%; left: 7%; animation-duration: 2.7s; }
      .starfield .star:nth-child(2) { top: 14%; left: 22%; animation-duration: 3.1s; }
      .starfield .star:nth-child(3) { top: 10%; left: 61%; animation-duration: 3.8s; }
      .starfield .star:nth-child(4) { top: 24%; left: 46%; animation-duration: 2.9s; }
      .starfield .star:nth-child(5) { top: 40%; left: 11%; animation-duration: 3.4s; }
      .starfield .star:nth-child(6) { top: 54%; left: 78%; animation-duration: 3.2s; }
      .starfield .star:nth-child(7) { top: 62%; left: 29%; animation-duration: 2.6s; }
      .starfield .star:nth-child(8) { top: 72%; left: 51%; animation-duration: 3.7s; }
      .starfield .star:nth-child(9) { top: 79%; left: 14%; animation-duration: 2.4s; }
      .starfield .star:nth-child(10){ top: 86%; left: 70%; animation-duration: 3.0s; }
      .starfield .star:nth-child(11){ top: 18%; left: 75%; animation-duration: 2.8s; }
      .starfield .star:nth-child(12){ top: 30%; left: 17%; animation-duration: 3.3s; }
      .starfield .star:nth-child(13){ top: 34%; left: 88%; animation-duration: 2.5s; }
      .starfield .star:nth-child(14){ top: 48%; left: 40%; animation-duration: 3.6s; }
      .starfield .star:nth-child(15){ top: 52%; left: 57%; animation-duration: 2.9s; }
      .starfield .star:nth-child(16){ top: 66%; left: 14%; animation-duration: 3.5s; }
      .starfield .star:nth-child(17){ top: 70%; left: 81%; animation-duration: 2.7s; }
      .starfield .star:nth-child(18){ top: 82%; left: 38%; animation-duration: 3.2s; }
      .starfield .star:nth-child(19){ top: 88%; left: 23%; animation-duration: 2.6s; }
      .starfield .star:nth-child(20){ top: 92%; left: 58%; animation-duration: 3.4s; }

      @keyframes starFlicker {
        0%, 100% { opacity: 0.65; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.08); }
      }

      .navbar {
        width: 100%;
        padding: 30px 50px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 10;
        background: rgba(0, 0, 0, 0.7);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
      }

      .nav-title-link {
        color: #f5f5f5;
        text-decoration: none;
        text-transform: uppercase;
        font-size: 1.8rem;
        font-weight: 700;
        letter-spacing: 0.25em;
        border-bottom: 2px dashed rgba(255, 255, 255, 0.35);
        padding-bottom: 8px;
      }

      .button {
        padding: 10px 22px;
        border: 2px solid #f3f3f3;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.05);
        color: #f3f3f3;
        text-decoration: none;
        transition: transform 0.2s ease, background-color 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }

      .button:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.12);
      }

      #main-content {
        margin: 180px 90px 80px;
        padding: 40px;
        background: rgba(15, 15, 15, 0.95);
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-shadow: 0 40px 120px rgba(0, 0, 0, 0.55);
        position: relative;
        overflow: hidden;
        border-radius: 22px;
      }

      #main-content::before {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image: linear-gradient(180deg, transparent 0%, rgba(255, 255, 255, 0.02) 1%, transparent 2%),
          linear-gradient(90deg, transparent 0%, rgba(255, 255, 255, 0.02) 1%, transparent 2%);
        opacity: 0.4;
      }

      .main-title {
        font-size: 3.4rem;
        color: #ffffff;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        text-align: center;
        margin: 0;
        line-height: 1.1;
        text-shadow: 0 0 24px rgba(255, 255, 255, 0.06);
      }

      .body-text {
        font-size: 1.05rem;
        color: #ededed;
        line-height: 1.85;
        font-weight: 700;
        letter-spacing: 0.01em;
        transition: color 0.2s ease;
      }

      .body-text:hover {
        color: #ffffff;
      }

      .subheader-text {
        font-size: 1.2rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #f8f8f8;
        border-left: 4px solid rgba(255, 255, 255, 0.7);
        padding-left: 14px;
        margin-top: 0;
      }

      .project-details-content,
      .gallery-image-container {
        position: relative;
      }

      .project-details-content {
        display: flex;
        flex-direction: column;
        gap: 28px;
        padding: 28px;
        border: 1px dashed rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.02);
        border-radius: 18px;
      }

      .project-details-content ul {
        margin: 0;
        padding-left: 1.2rem;
      }

      .project-details-content li {
        margin-bottom: 0.85rem;
      }

      .gallery-image-container {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: transform 0.25s ease, filter 0.25s ease;
      }

      .gallery-image-container.half-width {
        width: calc((100% - 16px) / 2);
      }

      .gallery-image {
        width: 100%;
        height: auto;
        display: block;
        filter: contrast(1.2) brightness(0.98);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 18px;
        box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
        transition: transform 0.4s ease, filter 0.4s ease;
      }

      .gallery-image-container:hover .gallery-image {
        transform: translateY(-4px) scale(1.01);
        filter: contrast(1.4) brightness(1.02);
      }

      .image-caption {
        color: #c7c7c7;
        font-size: 0.95rem;
        letter-spacing: 0.06em;
      }

      .icon-link img {
        width: 30px;
        height: 30px;
        filter: invert(1);
        transition: transform 0.3s ease;
      }

      .icon-link:hover img {
        transform: rotate(12deg);
      }

      .right-arrow-icon {
        margin-left: 10px;
      }

      .project-card {
        max-width: calc((100% - 32px) / 3);
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .project-card-text-container {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .portfolio-header-image {
        width: 100%;
        border-radius: 18px;
        margin: 20px 0;
        transition: transform 0.4s ease, filter 0.4s ease;
      }

      .portfolio-header-image:hover {
        transform: scale(1.03);
        filter: brightness(1.1) contrast(1.15);
      }

      header {
        text-align: center;
        padding: 40px 20px 0;
      }

      header h1 {
        margin: 0;
        color: #ffffff;
        font-size: 2.6rem;
        letter-spacing: 0.16em;
      }

      .container {
        max-width: 980px;
        margin: 0 auto;
        padding: 20px 22px 60px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .container p,
      .container li,
      .container h2,
      .container h3,
      .container .recommendations {
        color: #e4e4e4;
      }

      .container h2,
      .container h3 {
        color: #f3f3f3;
      }

      .recommendations {
        background: rgba(255, 255, 255, 0.04);
        border-left: 4px solid rgba(255, 255, 255, 0.25);
        padding: 18px;
      }

      footer {
        color: #c7c7c7;
        text-align: center;
        padding: 32px 20px;
      }

      @media only screen and (max-width: 1000px) {
        #main-content {
          margin: 170px 50px 50px;
          padding: 30px;
        }

        .project-card {
          max-width: 100%;
        }

        .gallery-image-container.half-width {
          width: 100%;
        }
      }

      @media only screen and (max-width: 600px) {
        .navbar,
        #footer {
          padding: 20px 20px;
        }

        .main-title {
          font-size: 2.4rem;
        }

        #main-content {
          margin: 140px 18px 30px;
          padding: 26px;
        }

        .media-grid {
          display: block;
        }

        .media-grid img,
        .media-grid video {
          width: 100%;
          height: auto;
        }
      }
    </style>
